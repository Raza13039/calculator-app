<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0ede8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .calc {
      width: 300px;
      background: #ffffff;
      border: 1px solid #d8d5d0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    .display {
      padding: 1.25rem;
      background: #f7f5f2;
      min-height: 96px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 4px;
      border-bottom: 1px solid #e0ddd8;
    }

    .expr {
      font-size: 13px;
      color: #999;
      min-height: 18px;
      word-break: break-all;
      text-align: right;
    }

    .result {
      font-size: 36px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1;
      word-break: break-all;
      text-align: right;
    }

    .btns {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #e0ddd8;
    }

    .btn {
      background: #ffffff;
      border: none;
      height: 68px;
      font-size: 18px;
      font-weight: 400;
      color: #1a1a1a;
      cursor: pointer;
      transition: background 0.1s;
    }

    .btn:hover { background: #f7f5f2; }
    .btn:active { background: #ece9e4; transform: scale(0.96); }

    .btn.op { color: #185FA5; font-weight: 500; }
    .btn.clear { color: #A32D2D; }

    .btn.equals {
      background: #185FA5;
      color: #fff;
      font-weight: 500;
    }
    .btn.equals:hover { background: #0C447C; }
    .btn.equals:active { background: #042C53; }

    .btn.zero {
      grid-column: span 2;
      text-align: left;
      padding-left: 28px;
    }
  </style>
</head>
<body>

  <div class="calc">
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="btns">
      <button class="btn clear" data-action="clear">AC</button>
      <button class="btn op"    data-action="sign">+/−</button>
      <button class="btn op"    data-action="percent">%</button>
      <button class="btn op"    data-op="/">÷</button>

      <button class="btn" data-num="7">7</button>
      <button class="btn" data-num="8">8</button>
      <button class="btn" data-num="9">9</button>
      <button class="btn op" data-op="*">×</button>

      <button class="btn" data-num="4">4</button>
      <button class="btn" data-num="5">5</button>
      <button class="btn" data-num="6">6</button>
      <button class="btn op" data-op="-">−</button>

      <button class="btn" data-num="1">1</button>
      <button class="btn" data-num="2">2</button>
      <button class="btn" data-num="3">3</button>
      <button class="btn op" data-op="+">+</button>

      <button class="btn zero" data-num="0">0</button>
      <button class="btn" data-num=".">.</button>
      <button class="btn equals" data-action="equals">=</button>
    </div>
  </div>

  <script>
    let cur = '0', prev = null, op = null, justEvaled = false;
    const dispResult = document.getElementById('result');
    const dispExpr   = document.getElementById('expr');

    function fmt(n) {
      let s = parseFloat(n.toPrecision(12)).toString();
      if (s.length > 12) s = parseFloat(n.toPrecision(9)).toString();
      return s;
    }

    function opSymbol(o) {
      return { '+': '+', '-': '−', '*': '×', '/': '÷' }[o] || o;
    }

    function updateDisplay(expr) {
      dispResult.textContent = cur;
      dispExpr.textContent   = expr || '';
    }

    function calculate(a, b, operator) {
      if (operator === '+') return a + b;
      if (operator === '-') return a - b;
      if (operator === '*') return a * b;
      if (operator === '/') return b === 0 ? null : a / b;
      return null;
    }

    document.querySelector('.btns').addEventListener('click', e => {
      const btn = e.target.closest('.btn');
      if (!btn) return;

      // Number / decimal input
      if (btn.dataset.num !== undefined) {
        const d = btn.dataset.num;
        if (d === '.' && cur.includes('.')) return;
        if (justEvaled) { cur = d === '.' ? '0.' : d; justEvaled = false; }
        else cur = (cur === '0' && d !== '.') ? d : cur + d;
        updateDisplay(prev !== null && op ? `${prev} ${opSymbol(op)}` : '');
      }

      // Operator buttons
      if (btn.dataset.op) {
        const newOp = btn.dataset.op;
        if (prev !== null && op && !justEvaled) {
          const r = calculate(parseFloat(prev), parseFloat(cur), op);
          if (r === null) { cur = 'Error'; prev = null; op = null; updateDisplay(''); return; }
          prev = fmt(r); cur = prev;
        } else {
          prev = cur;
        }
        op = newOp; justEvaled = false;
        updateDisplay(`${prev} ${opSymbol(op)}`);
      }

      // Action buttons
      switch (btn.dataset.action) {
        case 'equals':
          if (op && prev !== null) {
            const expr = `${prev} ${opSymbol(op)} ${cur} =`;
            const r = calculate(parseFloat(prev), parseFloat(cur), op);
            if (r === null) { cur = 'Error'; prev = null; op = null; updateDisplay(''); return; }
            cur = fmt(r); prev = null; op = null; justEvaled = true;
            updateDisplay(expr);
          }
          break;
        case 'clear':
          cur = '0'; prev = null; op = null; justEvaled = false;
          updateDisplay('');
          break;
        case 'sign':
          cur = fmt(parseFloat(cur) * -1);
          updateDisplay(prev && op ? `${prev} ${opSymbol(op)}` : '');
          break;
        case 'percent':
          cur = fmt(parseFloat(cur) / 100);
          updateDisplay(prev && op ? `${prev} ${opSymbol(op)}` : '');
          break;
      }
    });

    // Keyboard support
    document.addEventListener('keydown', e => {
      if ('0123456789'.includes(e.key)) {
        document.querySelector(`[data-num="${e.key}"]`)?.click();
      } else if (e.key === '.') {
        document.querySelector('[data-num="."]')?.click();
      } else if (e.key === '+') {
        document.querySelector('[data-op="+"]')?.click();
      } else if (e.key === '-') {
        document.querySelector('[data-op="-"]')?.click();
      } else if (e.key === '*') {
        document.querySelector('[data-op="*"]')?.click();
      } else if (e.key === '/') {
        e.preventDefault();
        document.querySelector('[data-op="/"]')?.click();
      } else if (e.key === 'Enter' || e.key === '=') {
        document.querySelector('[data-action="equals"]')?.click();
      } else if (e.key === 'Escape') {
        document.querySelector('[data-action="clear"]')?.click();
      } else if (e.key === 'Backspace') {
        cur = cur.length > 1 ? cur.slice(0, -1) : '0';
        updateDisplay(prev && op ? `${prev} ${opSymbol(op)}` : '');
      }
    });
  </script>

</body>
</html>
